databases:
  - name: ats-resume-builder-db
    plan: free
    databaseName: ats_resume_builder
    user: ats_resume_builder

services:
  - type: web
    name: ats-resume-builder-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: ats-resume-builder-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://resume-builder-three-azure.vercel.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
