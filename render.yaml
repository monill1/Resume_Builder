databases:
  - name: ats-resume-builder-db
    databaseName: ats_resume_builder
    user: ats_resume_builder

services:
  - type: web
    name: ats-resume-builder-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ats-resume-builder-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
